<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>My To-Do List</h2>
    <div class="input-area">
      <input type="text" id="inputbar" placeholder="Enter your task">
      <button onclick="getValue()">Add Task</button>
    </div>
    <ul id="my_ul"></ul>
    <button class="clear-btn" onclick="clearTask()">Clear All</button>
  </div>
  <script src="main.js"></script>
</body>
</html>
